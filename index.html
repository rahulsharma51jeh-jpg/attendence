<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Attendance Panel - Face Auth + Geofencing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

        .status-green { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .status-yellow { background: #fef9c3; color: #854d0e; border: 1px solid #fef08a; }

    </style>
</head>
<body>
<div id="app"></div>
<script>

// =============================================
// DATABASE LAYER (localStorage-based)
// =============================================
const DB = {
    init() {
        if (!localStorage.getItem('att_initialized')) {
            this.seed();
            localStorage.setItem('att_initialized', 'true');
        }
    },
    seed() {
        const schoolId = this.uuid();
        const school = {
            id: schoolId, name: 'Springfield High School',
            address: '123 Education Ave, Springfield',
            latitude: 28.6139, longitude: 77.2090, radiusMeters: 200,
            createdAt: new Date().toISOString()
        };
        this.save('schools', [school]);

        const teachers = [
            { id: this.uuid(), schoolId, name: 'Admin User', email: 'admin@school.com', password: 'admin123', role: 'admin', status: 'active', faceDescriptor: null },
            { id: this.uuid(), schoolId, name: 'Sarah Johnson', email: 'sarah@school.com', password: 'teacher123', role: 'teacher', status: 'active', faceDescriptor: null },
            { id: this.uuid(), schoolId, name: 'Michael Chen', email: 'michael@school.com', password: 'teacher123', role: 'teacher', status: 'active', faceDescriptor: null },
            { id: this.uuid(), schoolId, name: 'Emily Davis', email: 'emily@school.com', password: 'teacher123', role: 'teacher', status: 'active', faceDescriptor: null },
            { id: this.uuid(), schoolId, name: 'Rajesh Kumar', email: 'rajesh@school.com', password: 'teacher123', role: 'teacher', status: 'active', faceDescriptor: null },
            { id: this.uuid(), schoolId, name: 'Priya Sharma', email: 'priya@school.com', password: 'teacher123', role: 'teacher', status: 'active', faceDescriptor: null },
        ];
        this.save('teachers', teachers);
        this.save('attendance', []);
        this.save('notifications', []);
        this.save('locationLogs', []);
    },
    uuid() { return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16)}); },
    save(key, data) { localStorage.setItem('att_'+key, JSON.stringify(data)); },
    load(key) { return JSON.parse(localStorage.getItem('att_'+key) || '[]'); },
    getSchool() { return this.load('schools')[0]; },
    getTeachers() { return this.load('teachers'); },
    getTeacher(id) { return this.load('teachers').find(t=>t.id===id); },
    getTeacherByEmail(email) { return this.load('teachers').find(t=>t.email===email); },
    updateTeacher(id, updates) {
        const teachers = this.load('teachers').map(t => t.id===id ? {...t,...updates} : t);
        this.save('teachers', teachers);
    },
    addAttendance(record) {
        const records = this.load('attendance');
        const existing = records.findIndex(r => r.teacherId===record.teacherId && r.date===record.date && r.cycle===record.cycle);
        if (existing >= 0) { records[existing] = {...records[existing], ...record}; }
        else { records.push(record); }
        this.save('attendance', records);
        return record;
    },
    getAttendance(teacherId, date) {
        return this.load('attendance').filter(r => r.teacherId===teacherId && r.date===date);
    },
    getAllAttendanceToday(date) { return this.load('attendance').filter(r=>r.date===date); },
    addNotification(notif) {
        const notifs = this.load('notifications');
        notifs.unshift(notif);
        this.save('notifications', notifs);
    },
    getNotifications(teacherId) { return this.load('notifications').filter(n=>n.teacherId===teacherId); },
    markNotifRead(id) {
        const notifs = this.load('notifications').map(n=>n.id===id?{...n,isRead:true}:n);
        this.save('notifications', notifs);
    },
    markAllRead(teacherId) {
        const notifs = this.load('notifications').map(n=>n.teacherId===teacherId?{...n,isRead:true}:n);
        this.save('notifications', notifs);
    },
    addLocationLog(log) {
        const logs = this.load('locationLogs');
        logs.unshift(log);
        if (logs.length > 200) logs.pop();
        this.save('locationLogs', logs);
    },
    getLocationLogs(teacherId) { return this.load('locationLogs').filter(l=>l.teacherId===teacherId).slice(0,20); }
};


// =============================================
// UTILITY FUNCTIONS
// =============================================
const Utils = {
    getTodayDate() { return new Date().toISOString().split('T')[0]; },
    getCurrentCycle() {
        const hour = new Date().getHours();
        if (hour < 8) return 1; // Allow marking anytime for demo
        if (hour >= 18) return 5;
        return Math.floor((hour - 8) / 2) + 1;
    },
    getCycleLabel(cycle) {
        const labels = { 1:'8:00 AM - 10:00 AM', 2:'10:00 AM - 12:00 PM', 3:'12:00 PM - 2:00 PM', 4:'2:00 PM - 4:00 PM', 5:'4:00 PM - 6:00 PM' };
        return labels[cycle] || 'Current Cycle';
    },
    // Haversine formula for geofence calculation
    calculateDistance(lat1, lng1, lat2, lng2) {
        const R = 6371000; // Earth radius in meters
        const dLat = (lat2-lat1) * Math.PI/180;
        const dLng = (lng2-lng1) * Math.PI/180;
        const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return Math.round(R * c);
    },
    isInsideGeofence(teacherLat, teacherLng, schoolLat, schoolLng, radius) {
        const distance = this.calculateDistance(teacherLat, teacherLng, schoolLat, schoolLng);
        return { isInside: distance <= radius, distance };
    },
    getGeofenceStatus(distance, radius) {
        if (distance <= radius) return { status:'inside', label:'Inside School Premises', color:'green' };
        if (distance <= radius*1.5) return { status:'near', label:'Near School Boundary', color:'yellow' };
        return { status:'outside', label:'Outside School Premises', color:'red' };
    },
    euclideanDistance(desc1, desc2) {
        if (!desc1 || !desc2 || desc1.length !== desc2.length) return 999;
        let sum = 0;
        for (let i = 0; i < desc1.length; i++) sum += Math.pow(desc1[i]-desc2[i], 2);
        return Math.sqrt(sum);
    },
    formatTime(date) {
        return new Date(date).toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
    },
    formatDateTime(date) {
        return new Date(date).toLocaleString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
    }
};


// =============================================
// NOTIFICATION SCHEDULER (2-hour cycle)
// =============================================
const Scheduler = {
    intervalId: null,
    lastCycleNotified: 0,
    start() {
        // Check every 30 seconds for demo (production: every minute)
        this.intervalId = setInterval(() => this.check(), 30000);
        // Also check immediately
        setTimeout(() => this.check(), 2000);
    },
    stop() { if (this.intervalId) clearInterval(this.intervalId); },
    check() {
        const currentUser = App.state.currentUser;
        if (!currentUser || currentUser.role === 'admin') return;

        const cycle = Utils.getCurrentCycle();
        const today = Utils.getTodayDate();

        // Only notify once per cycle
        if (cycle === this.lastCycleNotified) return;

        // Check if attendance already marked for this cycle
        const records = DB.getAttendance(currentUser.id, today);
        const alreadyMarked = records.find(r => r.cycle === cycle);

        if (!alreadyMarked) {
            this.lastCycleNotified = cycle;
            const notif = {
                id: DB.uuid(),
                teacherId: currentUser.id,
                message: `Attendance reminder! Please mark your attendance for ${Utils.getCycleLabel(cycle)}. Use face verification to check in.`,
                type: 'attendance_reminder',
                isRead: false,
                sentAt: new Date().toISOString(),
                cycle
            };
            DB.addNotification(notif);
            App.state.notifications = DB.getNotifications(currentUser.id);
            App.render();

            // Browser notification
            if (Notification.permission === 'granted') {
                new Notification('Attendance Reminder', { body: notif.message, icon: '📋' });
            }
        }
    },
    triggerManual() {
        const school = DB.getSchool();
        const teachers = DB.getTeachers().filter(t => t.role === 'teacher' && t.status === 'active');
        const cycle = Utils.getCurrentCycle();
        const today = Utils.getTodayDate();

        teachers.forEach(teacher => {
            const records = DB.getAttendance(teacher.id, today);
            if (!records.find(r => r.cycle === cycle)) {
                DB.addNotification({
                    id: DB.uuid(),
                    teacherId: teacher.id,
                    message: `Admin triggered: Mark attendance for ${Utils.getCycleLabel(cycle)} now!`,
                    type: 'attendance_reminder',
                    isRead: false,
                    sentAt: new Date().toISOString(),
                    cycle
                });
            }
        });
        return teachers.length;
    }
};


// =============================================
// FACE AUTHENTICATION ENGINE
// =============================================
const FaceEngine = {
    modelsLoaded: false,
    async loadModels() {
        if (this.modelsLoaded) return true;
        try {
            if (typeof faceapi === 'undefined') {
                console.warn('face-api.js not loaded yet, using fallback mode');
                return false;
            }
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
            await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
            this.modelsLoaded = true;
            return true;
        } catch (err) {
            console.error('Model load failed:', err);
            return false;
        }
    },
    async detectFace(videoElement) {
        if (!this.modelsLoaded || typeof faceapi === 'undefined') return null;
        try {
            const detection = await faceapi.detectSingleFace(videoElement)
                .withFaceLandmarks()
                .withFaceDescriptor();
            if (detection) return Array.from(detection.descriptor);
            return null;
        } catch (err) {
            console.error('Face detection error:', err);
            return null;
        }
    },
    verifyFace(storedDescriptor, capturedDescriptor) {
        if (!storedDescriptor || !capturedDescriptor) return false;
        const distance = Utils.euclideanDistance(storedDescriptor, capturedDescriptor);
        return distance < 0.6; // Threshold for match
    }
};


// =============================================
// GEOLOCATION ENGINE
// =============================================
const GeoEngine = {
    currentPosition: null,
    watchId: null,
    async getCurrentPosition() {
        return new Promise((resolve, reject) => {
            if (!navigator.geolocation) {
                reject(new Error('Geolocation not supported'));
                return;
            }
            navigator.geolocation.getCurrentPosition(
                pos => {
                    this.currentPosition = { latitude: pos.coords.latitude, longitude: pos.coords.longitude };
                    resolve(this.currentPosition);
                },
                err => reject(err),
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        });
    },
    startTracking(callback) {
        if (!navigator.geolocation) return;
        this.watchId = navigator.geolocation.watchPosition(
            pos => {
                this.currentPosition = { latitude: pos.coords.latitude, longitude: pos.coords.longitude };
                if (callback) callback(this.currentPosition);
            },
            err => console.error('Geo tracking error:', err),
            { enableHighAccuracy: true, maximumAge: 30000 }
        );
    },
    stopTracking() {
        if (this.watchId) navigator.geolocation.clearWatch(this.watchId);
    },
    verifyGeofence(lat, lng) {
        const school = DB.getSchool();
        const result = Utils.isInsideGeofence(lat, lng, school.latitude, school.longitude, school.radiusMeters);
        const status = Utils.getGeofenceStatus(result.distance, school.radiusMeters);
        return { ...result, ...status, school };
    }
};


// =============================================
// MAIN APPLICATION STATE & ROUTER
// =============================================
const App = {
    state: {
        currentUser: null,
        currentPage: 'login', // login, dashboard, teacher
        notifications: [],
        liveData: null,
        geofenceStatus: null,
        myStatus: null,
        showFaceModal: false,
        faceMode: 'verify', // verify or register
        showNotifPanel: false,
        error: '',
        success: '',
        loading: false
    },

    init() {
        DB.init();
        // Check stored session
        const stored = localStorage.getItem('att_session');
        if (stored) {
            const session = JSON.parse(stored);
            const teacher = DB.getTeacher(session.id);
            if (teacher) {
                this.state.currentUser = teacher;
                this.state.currentPage = teacher.role === 'admin' ? 'dashboard' : 'teacher';
                this.state.notifications = DB.getNotifications(teacher.id);
            }
        }
        // Request notification permission
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }
        Scheduler.start();
        this.render();
        // Auto-refresh dashboard every 10 seconds
        setInterval(() => { if (this.state.currentPage === 'dashboard') this.refreshDashboard(); }, 10000);
    },

    login(email, password) {
        const teacher = DB.getTeacherByEmail(email);
        if (!teacher || teacher.password !== password) {
            this.state.error = 'Invalid email or password';
            this.render();
            return;
        }
        this.state.currentUser = teacher;
        this.state.currentPage = teacher.role === 'admin' ? 'dashboard' : 'teacher';
        this.state.notifications = DB.getNotifications(teacher.id);
        this.state.error = '';
        localStorage.setItem('att_session', JSON.stringify({ id: teacher.id }));
        this.render();
    },

    logout() {
        this.state.currentUser = null;
        this.state.currentPage = 'login';
        this.state.error = '';
        this.state.success = '';
        localStorage.removeItem('att_session');
        GeoEngine.stopTracking();
        this.render();
    },

    refreshDashboard() {
        if (this.state.currentPage === 'dashboard') this.render();
    },

    render() {
        const app = document.getElementById('app');
        switch (this.state.currentPage) {
            case 'login': app.innerHTML = this.renderLogin(); break;
            case 'dashboard': app.innerHTML = this.renderDashboard(); break;
            case 'teacher': app.innerHTML = this.renderTeacherPanel(); break;
        }
        this.attachEvents();
    },

                    <div class="text-center mb-8">
                        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-100 mb-4">
                            <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                        </div>
                        <h1 class="text-2xl font-bold text-gray-900">Live Attendance Panel</h1>
                        <p class="text-gray-500 mt-1">Face Auth + Geofencing + Real-time Monitoring</p>
                    </div>
                    ${this.state.error ? `<div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-600 text-sm">${this.state.error}</div>` : ''}
                    <form id="loginForm" class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                            <input type="email" id="loginEmail" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 transition" placeholder="Enter your email" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                            <div class="relative">
                                <input type="password" id="loginPassword" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 transition" placeholder="Enter password" required>
                            </div>
                        </div>
                        <button type="submit" class="w-full py-3 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 transition">Sign In</button>
                    </form>
                    <div class="mt-6 p-4 bg-slate-50 rounded-lg">
                        <p class="text-xs font-medium text-slate-500 mb-2">Demo Credentials:</p>
                        <div class="space-y-1 text-xs text-slate-600">
                            <p><span class="font-medium">Admin:</span> admin@school.com / admin123</p>
                            <p><span class="font-medium">Teacher:</span> sarah@school.com / teacher123</p>
                        </div>
                    </div>
                    <div class="mt-4 p-3 bg-indigo-50 rounded-lg">
                        <p class="text-xs text-indigo-700"><strong>Features:</strong> Face Authentication, GPS Geofencing (${DB.getSchool().radiusMeters}m radius), 2-Hour Notifications, Live Dashboard</p>
                    </div>
                </div>
            </div>
        </div>`;
    },


    // =============================================
    // ADMIN DASHBOARD (Live Monitoring)
    // =============================================
    renderDashboard() {
        const school = DB.getSchool();
        const teachers = DB.getTeachers().filter(t => t.status === 'active');
        const today = Utils.getTodayDate();
        const cycle = Utils.getCurrentCycle();
        const todayRecords = DB.getAllAttendanceToday(today);

        let insideCount = 0, outsideCount = 0, absentCount = 0;
        const teacherRows = teachers.map(t => {
            const records = todayRecords.filter(r => r.teacherId === t.id);
            const currentRecord = records.find(r => r.cycle === cycle);
            let status = 'absent', statusClass = 'status-red', statusLabel = 'Absent';
            if (currentRecord) {
                if (currentRecord.isInsideGeofence) { status='inside'; statusClass='status-green'; statusLabel='Inside'; insideCount++; }
                else { status='outside'; statusClass='status-yellow'; statusLabel='Outside'; outsideCount++; }
            } else { absentCount++; }
            const rate = records.filter(r=>r.status==='present').length + '/' + Math.max(cycle, 1);
            return { ...t, status, statusClass, statusLabel, currentRecord, rate, records };
        });

        const unread = this.state.notifications.filter(n => !n.isRead).length;

        return `
        <div class="min-h-screen bg-slate-50">

                        </button>
                        <div class="relative">
                            <button id="btnNotif" class="p-2 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg">

                                ${unread > 0 ? `<span class="notification-badge">${unread}</span>` : ''}
                            </button>
                        </div>
                        <span class="text-sm text-slate-600">${this.state.currentUser.name}</span>
                        <button id="btnLogout" class="p-2 text-slate-500 hover:text-red-600 hover:bg-red-50 rounded-lg" title="Logout">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                        </button>
                    </div>
                </div>
            </header>
            <main class="max-w-7xl mx-auto px-4 py-6">
                <!-- Stats -->
                <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
                    <div class="bg-white rounded-xl shadow-sm border p-4">
                        <p class="text-2xl font-bold text-indigo-600">${teachers.length}</p>
                        <p class="text-xs text-slate-500">Total Teachers</p>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border p-4">
                        <p class="text-2xl font-bold text-green-600">${insideCount}</p>
                        <p class="text-xs text-slate-500">Present (Inside)</p>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border p-4">
                        <p class="text-2xl font-bold text-yellow-600">${outsideCount}</p>
                        <p class="text-xs text-slate-500">Present (Outside)</p>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border p-4">
                        <p class="text-2xl font-bold text-red-600">${absentCount}</p>
                        <p class="text-xs text-slate-500">Absent</p>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border p-4">
                        <p class="text-2xl font-bold text-purple-600">C${cycle}</p>

                <!-- Controls -->

    // =============================================
    // MAP INITIALIZATION
    // =============================================
    initMap() {
        const mapEl = document.getElementById('map');
        if (!mapEl || typeof L === 'undefined') return;
        
        setTimeout(() => {
            const school = DB.getSchool();
            const map = L.map('map').setView([school.latitude, school.longitude], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            // School marker
            L.marker([school.latitude, school.longitude])
                .addTo(map)
                .bindPopup(`<b>${school.name}</b><br>Geofence: ${school.radiusMeters}m radius`);

            // Geofence circle
            L.circle([school.latitude, school.longitude], {
                radius: school.radiusMeters,
                color: '#4f46e5',
                fillColor: '#4f46e5',
                fillOpacity: 0.1,
                weight: 2,
                dashArray: '5,5'
            }).addTo(map);

            // Teacher position
            if (GeoEngine.currentPosition) {
                const pos = GeoEngine.currentPosition;
                const geo = GeoEngine.verifyGeofence(pos.latitude, pos.longitude);
                L.marker([pos.latitude, pos.longitude], {
                    icon: L.divIcon({
                        className: '',
                        html: `<div style="background:${geo.isInside?'#22c55e':'#ef4444'};width:16px;height:16px;border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3)"></div>`,
                        iconSize: [16, 16],
                        iconAnchor: [8, 8]
                    })
                }).addTo(map).bindPopup(`<b>Your Location</b><br>${geo.distance}m from school`);
            }
        }, 100);
    },


    // =============================================
    // CAMERA & FACE CAPTURE
    // =============================================
    cameraStream: null,

    async startCamera() {
        const video = document.getElementById('faceVideo');
        const statusEl = document.getElementById('faceStatus');
        if (!video) return;

        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'user', width: 640, height: 480 }
            });
            this.cameraStream = stream;
            video.srcObject = stream;
            await video.play();

            if (statusEl) statusEl.innerHTML = '<span>Camera ready. Position your face in the oval and click capture.</span>';

            // Try loading face-api models
            const loaded = await FaceEngine.loadModels();
            if (loaded && statusEl) {
                statusEl.innerHTML = '<span style="color:#86efac">✓ Face detection models loaded. Ready to capture.</span>';
            }
        } catch (err) {
            if (statusEl) statusEl.innerHTML = '<span style="color:#fca5a5">Camera access denied. Please allow camera permissions.</span>';
        }
    },

    stopCamera() {
        if (this.cameraStream) {
            this.cameraStream.getTracks().forEach(t => t.stop());
            this.cameraStream = null;
        }
    },

    closeFaceModal() {
        this.stopCamera();
        this.state.showFaceModal = false;
        this.render();
    },

    async captureFace() {
        const video = document.getElementById('faceVideo');
        const statusEl = document.getElementById('faceStatus');
        const btnCapture = document.getElementById('btnCaptureFace');

        if (btnCapture) btnCapture.disabled = true;
        if (statusEl) statusEl.innerHTML = '<span>🔄 Analyzing face...</span>';

        let descriptor = null;

        // Try face-api.js first
        if (FaceEngine.modelsLoaded && video) {
            descriptor = await FaceEngine.detectFace(video);
        }

        // Fallback: generate descriptor from video frame analysis
        if (!descriptor) {
            // Use canvas to capture frame and generate a pseudo-descriptor
            const canvas = document.createElement('canvas');
            canvas.width = 640; canvas.height = 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            
            // Generate descriptor from pixel data (simplified face hash)
            const imageData = ctx.getImageData(200, 100, 240, 280);
            descriptor = [];
            for (let i = 0; i < 128; i++) {
                const idx = Math.floor(i * (imageData.data.length / 128));
                descriptor.push((imageData.data[idx] / 255) - 0.5);
            }
        }

        if (!descriptor || descriptor.length === 0) {
            if (statusEl) statusEl.innerHTML = '<span style="color:#fca5a5">No face detected. Please try again.</span>';
            if (btnCapture) btnCapture.disabled = false;
            return;
        }

        if (this.state.faceMode === 'register') {
            // Register face
            DB.updateTeacher(this.state.currentUser.id, { faceDescriptor: descriptor });
            this.state.currentUser = DB.getTeacher(this.state.currentUser.id);
            localStorage.setItem('att_session', JSON.stringify({ id: this.state.currentUser.id }));
            if (statusEl) statusEl.innerHTML = '<span style="color:#86efac">✅ Face registered successfully!</span>';
            setTimeout(() => this.closeFaceModal(), 1500);
        } else {
            // Verify face and check in
            await this.handleCheckIn(descriptor);
        }
    },


    // =============================================
    // CHECK-IN / CHECK-OUT LOGIC
    // =============================================
    async handleCheckIn(faceDescriptor) {
        const statusEl = document.getElementById('faceStatus');
        const user = this.state.currentUser;

        // Verify face against stored descriptor
        if (user.faceDescriptor) {
            const isMatch = FaceEngine.verifyFace(user.faceDescriptor, faceDescriptor);
            if (!isMatch) {
                if (statusEl) statusEl.innerHTML = '<span style="color:#fca5a5">❌ Face verification failed! Your face does not match the registered face.</span>';
                const btnCapture = document.getElementById('btnCaptureFace');
                if (btnCapture) btnCapture.disabled = false;
                return;
            }
        }

        if (statusEl) statusEl.innerHTML = '<span style="color:#86efac">✅ Face verified! Getting location...</span>';

        // Get location
        let position;
        try {
            position = await GeoEngine.getCurrentPosition();
        } catch (err) {
            // Use school location as fallback for demo
            const school = DB.getSchool();
            position = { latitude: school.latitude + (Math.random()-0.5)*0.002, longitude: school.longitude + (Math.random()-0.5)*0.002 };
        }

        // Check geofence
        const geo = GeoEngine.verifyGeofence(position.latitude, position.longitude);
        this.state.geofenceStatus = geo;

        // Create attendance record
        const cycle = Utils.getCurrentCycle();
        const record = {
            id: DB.uuid(),
            teacherId: user.id,
            schoolId: user.schoolId,
            checkInTime: new Date().toISOString(),
            checkOutTime: null,
            status: 'present',
            locationLat: position.latitude,
            locationLng: position.longitude,
            isInsideGeofence: geo.isInside,
            distance: geo.distance,
            faceVerified: true,
            date: Utils.getTodayDate(),
            cycle: cycle
        };

        DB.addAttendance(record);

        // Log location
        DB.addLocationLog({
            id: DB.uuid(),
            teacherId: user.id,
            latitude: position.latitude,
            longitude: position.longitude,
            isInsideGeofence: geo.isInside,
            loggedAt: new Date().toISOString()
        });

        // Generate alert if outside geofence
        if (!geo.isInside) {
            DB.addNotification({
                id: DB.uuid(),
                teacherId: user.id,
                message: `⚠️ Geofence Alert: You checked in ${geo.distance}m away from school premises.`,
                type: 'geofence_alert',
                isRead: false,
                sentAt: new Date().toISOString()
            });
        }

        this.state.success = `✅ Attendance marked! Cycle ${cycle} (${Utils.getCycleLabel(cycle)}) | Face: Verified | Location: ${geo.isInside ? 'Inside' : 'Outside ('+geo.distance+'m)'}`;
        this.state.error = '';
        this.state.notifications = DB.getNotifications(user.id);

        if (statusEl) statusEl.innerHTML = '<span style="color:#86efac">✅ Attendance marked successfully!</span>';
        setTimeout(() => this.closeFaceModal(), 1500);
    },

    handleCheckOut() {
        const user = this.state.currentUser;
        const today = Utils.getTodayDate();
        const cycle = Utils.getCurrentCycle();
        const records = DB.getAttendance(user.id, today);
        const currentRecord = records.find(r => r.cycle === cycle);

        if (!currentRecord) {
            this.state.error = 'No check-in found for current cycle. Please check in first.';
            this.state.success = '';
            this.render();
            return;
        }

        // Update with checkout time
        DB.addAttendance({ ...currentRecord, checkOutTime: new Date().toISOString() });
        this.state.success = `🚪 Checked out for Cycle ${cycle} at ${new Date().toLocaleTimeString()}`;
        this.state.error = '';
        this.render();
    },

    async refreshGeofence() {
        try {
            const pos = await GeoEngine.getCurrentPosition();
            const geo = GeoEngine.verifyGeofence(pos.latitude, pos.longitude);
            this.state.geofenceStatus = geo;

            DB.addLocationLog({
                id: DB.uuid(),
                teacherId: this.state.currentUser.id,
                latitude: pos.latitude,
                longitude: pos.longitude,
                isInsideGeofence: geo.isInside,
                loggedAt: new Date().toISOString()
            });

            // Alert if outside
            if (!geo.isInside) {
                this.state.error = `⚠️ You are ${geo.distance}m from school (outside ${DB.getSchool().radiusMeters}m radius)`;
            } else {
                this.state.success = `📍 Location verified: ${geo.distance}m from school center (inside radius)`;
                this.state.error = '';
            }
        } catch (err) {
            this.state.error = 'Unable to get location. Please enable GPS and try again.';
        }
        this.render();
    },

    dismissNotif(id) {
        DB.markNotifRead(id);
        this.state.notifications = DB.getNotifications(this.state.currentUser.id);
        this.render();
    }
};


// =============================================
// INITIALIZE APPLICATION
// =============================================
document.addEventListener('DOMContentLoaded', () => {
    App.init();
});
</script>
