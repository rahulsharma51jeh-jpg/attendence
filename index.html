<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Attendance Panel - Complete Admin System</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc}
.pulse-dot{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.fade-in{animation:fadeIn .3s ease-in}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.modal-overlay{background:rgba(0,0,0,.6);backdrop-filter:blur(4px)}
.notification-badge{position:absolute;top:-4px;right:-4px;width:18px;height:18px;background:#ef4444;color:#fff;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center}
#map,#schoolMap,#adminMap{height:350px;border-radius:12px;z-index:1}
.status-green{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
.status-yellow{background:#fef9c3;color:#854d0e;border:1px solid #fef08a}
.status-red{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
.camera-guide{border:2px dashed rgba(255,255,255,.5);border-radius:50%;width:200px;height:240px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.tab-active{border-bottom:3px solid #4f46e5;color:#4f46e5;font-weight:600}
.tab-inactive{border-bottom:3px solid transparent;color:#64748b}
.tab-btn{padding:12px 16px;cursor:pointer;transition:all .2s;font-size:13px;white-space:nowrap}
.tab-btn:hover{color:#4f46e5}
.chart-bar{transition:height .5s ease;border-radius:4px 4px 0 0;min-width:20px}
.photo-circle{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid #e2e8f0}
.photo-placeholder{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;font-weight:700}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ===== DATABASE =====
const DB={
init(){if(!localStorage.getItem('att_v2')){this.seed();localStorage.setItem('att_v2','1')}},
seed(){
const sid=this.uuid();
this.save('schools',[{id:sid,name:'Springfield High School',address:'123 Education Ave, Springfield',latitude:28.6139,longitude:77.2090,radiusMeters:200,createdAt:new Date().toISOString()}]);
const ts=[
{id:this.uuid(),schoolId:sid,name:'Admin User',email:'admin@school.com',password:'admin123',role:'admin',status:'active',faceDescriptor:null,photo:null},
{id:this.uuid(),schoolId:sid,name:'Sarah Johnson',email:'sarah@school.com',password:'teacher123',role:'teacher',status:'active',faceDescriptor:null,photo:null},
{id:this.uuid(),schoolId:sid,name:'Michael Chen',email:'michael@school.com',password:'teacher123',role:'teacher',status:'active',faceDescriptor:null,photo:null},
{id:this.uuid(),schoolId:sid,name:'Emily Davis',email:'emily@school.com',password:'teacher123',role:'teacher',status:'active',faceDescriptor:null,photo:null},
{id:this.uuid(),schoolId:sid,name:'Rajesh Kumar',email:'rajesh@school.com',password:'teacher123',role:'teacher',status:'active',faceDescriptor:null,photo:null},
{id:this.uuid(),schoolId:sid,name:'Priya Sharma',email:'priya@school.com',password:'teacher123',role:'teacher',status:'active',faceDescriptor:null,photo:null}];
this.save('teachers',ts);this.save('notifications',[]);this.save('locationLogs',[]);
// Seed 30 days of historical attendance
const recs=[];const today=new Date();
ts.filter(t=>t.role==='teacher').forEach(t=>{for(let d=30;d>=1;d--){const dt=new Date(today);dt.setDate(today.getDate()-d);if(dt.getDay()===0||dt.getDay()===6)continue;const ds=dt.toISOString().split('T')[0];const cp=Math.floor(Math.random()*3)+2;for(let c=1;c<=cp;c++){const ins=Math.random()>.15;recs.push({id:this.uuid(),teacherId:t.id,schoolId:sid,checkInTime:new Date(dt.getTime()+(6+c*2)*36e5).toISOString(),checkOutTime:new Date(dt.getTime()+(7+c*2)*36e5).toISOString(),status:'present',locationLat:28.6139+(Math.random()-.5)*.003,locationLng:77.209+(Math.random()-.5)*.003,isInsideGeofence:ins,distance:ins?Math.floor(Math.random()*150):200+Math.floor(Math.random()*500),faceVerified:true,date:ds,cycle:c});}}});
this.save('attendance',recs);
},
uuid(){return'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16)})},
save(k,d){localStorage.setItem('att_'+k,JSON.stringify(d))},
load(k){return JSON.parse(localStorage.getItem('att_'+k)||'[]')},
getSchool(){return this.load('schools')[0]},
getSchools(){return this.load('schools')},
addSchool(s){const a=this.load('schools');a.push(s);this.save('schools',a)},
updateSchool(id,u){this.save('schools',this.load('schools').map(s=>s.id===id?{...s,...u}:s))},
getTeachers(){return this.load('teachers')},
getTeacher(id){return this.load('teachers').find(t=>t.id===id)},
getTeacherByEmail(e){return this.load('teachers').find(t=>t.email===e)},
updateTeacher(id,u){this.save('teachers',this.load('teachers').map(t=>t.id===id?{...t,...u}:t))},
addAttendance(r){const a=this.load('attendance');const i=a.findIndex(x=>x.teacherId===r.teacherId&&x.date===r.date&&x.cycle===r.cycle);if(i>=0)a[i]={...a[i],...r};else a.push(r);this.save('attendance',a);return r},
getAttendance(tid,d){return this.load('attendance').filter(r=>r.teacherId===tid&&r.date===d)},
getAllAttendanceToday(d){return this.load('attendance').filter(r=>r.date===d)},
getAttendanceRange(tid,s,e){return this.load('attendance').filter(r=>r.teacherId===tid&&r.date>=s&&r.date<=e)},
getAllAttendanceRange(s,e){return this.load('attendance').filter(r=>r.date>=s&&r.date<=e)},
addNotification(n){const a=this.load('notifications');a.unshift(n);this.save('notifications',a)},
getNotifications(tid){return this.load('notifications').filter(n=>n.teacherId===tid)},
markNotifRead(id){this.save('notifications',this.load('notifications').map(n=>n.id===id?{...n,isRead:true}:n))},
markAllRead(tid){this.save('notifications',this.load('notifications').map(n=>n.teacherId===tid?{...n,isRead:true}:n))},
addLocationLog(l){const a=this.load('locationLogs');a.unshift(l);if(a.length>200)a.pop();this.save('locationLogs',a)},
getLocationLogs(tid){return this.load('locationLogs').filter(l=>l.teacherId===tid).slice(0,20)}
};

// ===== UTILS =====
const Utils={
getTodayDate(){return new Date().toISOString().split('T')[0]},
getCurrentCycle(){const h=new Date().getHours();if(h<8)return 1;if(h>=18)return 5;return Math.floor((h-8)/2)+1},
getCycleLabel(c){return{1:'8-10 AM',2:'10-12 PM',3:'12-2 PM',4:'2-4 PM',5:'4-6 PM'}[c]||'Cycle'},
calculateDistance(a,b,c,d){const R=6371000,dLat=(c-a)*Math.PI/180,dLng=(d-b)*Math.PI/180,x=Math.sin(dLat/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLng/2)**2;return Math.round(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)))},
isInsideGeofence(a,b,c,d,r){const dist=this.calculateDistance(a,b,c,d);return{isInside:dist<=r,distance:dist}},
getGeofenceStatus(dist,r){if(dist<=r)return{status:'inside',label:'Inside School',color:'green'};if(dist<=r*1.5)return{status:'near',label:'Near Boundary',color:'yellow'};return{status:'outside',label:'Outside School',color:'red'}},
euclideanDistance(a,b){if(!a||!b||a.length!==b.length)return 999;let s=0;for(let i=0;i<a.length;i++)s+=(a[i]-b[i])**2;return Math.sqrt(s)},
formatTime(d){return new Date(d).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})},
formatDateTime(d){return new Date(d).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})},
formatDate(d){return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'})},
getLastNDays(n){const days=[],t=new Date();for(let i=n-1;i>=0;i--){const d=new Date(t);d.setDate(t.getDate()-i);days.push(d.toISOString().split('T')[0])}return days}
};

// ===== ENGINES =====
const Scheduler={intervalId:null,lastCN:0,
start(){this.intervalId=setInterval(()=>this.check(),30000);setTimeout(()=>this.check(),2000)},
check(){const u=App.state.currentUser;if(!u||u.role==='admin')return;const c=Utils.getCurrentCycle(),t=Utils.getTodayDate();if(c===this.lastCN)return;if(!DB.getAttendance(u.id,t).find(r=>r.cycle===c)){this.lastCN=c;DB.addNotification({id:DB.uuid(),teacherId:u.id,message:`Attendance reminder for ${Utils.getCycleLabel(c)}!`,type:'reminder',isRead:false,sentAt:new Date().toISOString()});App.state.notifications=DB.getNotifications(u.id);App.render();if(Notification.permission==='granted')new Notification('Mark Attendance',{body:`Cycle ${c}: ${Utils.getCycleLabel(c)}`})}},
triggerManual(){const ts=DB.getTeachers().filter(t=>t.role==='teacher'),c=Utils.getCurrentCycle(),d=Utils.getTodayDate();ts.forEach(t=>{if(!DB.getAttendance(t.id,d).find(r=>r.cycle===c))DB.addNotification({id:DB.uuid(),teacherId:t.id,message:`Admin: Mark attendance for ${Utils.getCycleLabel(c)}!`,type:'reminder',isRead:false,sentAt:new Date().toISOString()})});return ts.length}};

const FaceEngine={modelsLoaded:false,
async loadModels(){if(this.modelsLoaded)return true;try{if(typeof faceapi==='undefined')return false;const U='https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';await faceapi.nets.ssdMobilenetv1.loadFromUri(U);await faceapi.nets.faceLandmark68Net.loadFromUri(U);await faceapi.nets.faceRecognitionNet.loadFromUri(U);this.modelsLoaded=true;return true}catch(e){return false}},
async detectFace(v){if(!this.modelsLoaded)return null;try{const d=await faceapi.detectSingleFace(v).withFaceLandmarks().withFaceDescriptor();return d?Array.from(d.descriptor):null}catch(e){return null}},
verifyFace(s,c){return s&&c?Utils.euclideanDistance(s,c)<.6:false}};

const GeoEngine={currentPosition:null,
async getCurrentPosition(){return new Promise((res,rej)=>{if(!navigator.geolocation)rej('No GPS');navigator.geolocation.getCurrentPosition(p=>{this.currentPosition={latitude:p.coords.latitude,longitude:p.coords.longitude};res(this.currentPosition)},e=>rej(e),{enableHighAccuracy:true,timeout:10000})})},
stopTracking(){},
verifyGeofence(lat,lng){const s=DB.getSchool(),r=Utils.isInsideGeofence(lat,lng,s.latitude,s.longitude,s.radiusMeters),st=Utils.getGeofenceStatus(r.distance,s.radiusMeters);return{...r,...st,school:s}}};

// ===== MAIN APP =====
const App={
state:{currentUser:null,currentPage:'login',adminTab:'live',notifications:[],geofenceStatus:null,showFaceModal:false,faceMode:'verify',error:'',success:'',loading:false,schoolMapInstance:null,schoolMarker:null,newSchoolLat:null,newSchoolLng:null,reportStart:'',reportEnd:'',reportTeacher:'all'},
init(){DB.init();const s=localStorage.getItem('att_session');if(s){const t=DB.getTeacher(JSON.parse(s).id);if(t){this.state.currentUser=t;this.state.currentPage=t.role==='admin'?'dashboard':'teacher';this.state.notifications=DB.getNotifications(t.id)}}if('Notification' in window&&Notification.permission==='default')Notification.requestPermission();Scheduler.start();this.render();setInterval(()=>{if(this.state.currentPage==='dashboard'&&this.state.adminTab==='live')this.render()},15000)},
login(e,p){const t=DB.getTeacherByEmail(e);if(!t||t.password!==p){this.state.error='Invalid credentials';this.render();return}this.state.currentUser=t;this.state.currentPage=t.role==='admin'?'dashboard':'teacher';this.state.notifications=DB.getNotifications(t.id);this.state.error='';localStorage.setItem('att_session',JSON.stringify({id:t.id}));this.render()},
logout(){this.state.currentUser=null;this.state.currentPage='login';this.state.error='';this.state.success='';localStorage.removeItem('att_session');this.render()},
render(){const a=document.getElementById('app');switch(this.state.currentPage){case'login':a.innerHTML=this.renderLogin();break;case'dashboard':a.innerHTML=this.renderDashboard();break;case'teacher':a.innerHTML=this.renderTeacherPanel();break}this.bindEvents()},
switchTab(t){this.state.adminTab=t;this.render()},

// ===== LOGIN =====
renderLogin(){return`<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-100 via-white to-purple-100 p-4"><div class="max-w-md w-full"><div class="bg-white rounded-2xl shadow-xl p-8 fade-in"><div class="text-center mb-8"><div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-100 mb-4"><svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg></div><h1 class="text-2xl font-bold text-gray-900">Live Attendance Panel</h1><p class="text-gray-500 mt-1">Face Auth + Geofencing + Analytics</p></div>${this.state.error?`<div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-600 text-sm">${this.state.error}</div>`:''}<form id="loginForm" class="space-y-5"><div><label class="block text-sm font-medium text-gray-700 mb-1">Email</label><input type="email" id="loginEmail" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="Email" required></div><div><label class="block text-sm font-medium text-gray-700 mb-1">Password</label><input type="password" id="loginPassword" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="Password" required></div><button type="submit" class="w-full py-3 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700">Sign In</button></form><div class="mt-6 p-4 bg-slate-50 rounded-lg text-xs text-slate-600"><p class="font-medium text-slate-500 mb-1">Demo:</p><p>Admin: admin@school.com / admin123</p><p>Teacher: sarah@school.com / teacher123</p></div></div></div></div>`},

// ===== ADMIN DASHBOARD =====
renderDashboard(){
const school=DB.getSchool(),teachers=DB.getTeachers().filter(t=>t.status==='active'),today=Utils.getTodayDate(),cycle=Utils.getCurrentCycle(),recs=DB.getAllAttendanceToday(today);
let insC=0,outC=0,absC=0;
const rows=teachers.map(t=>{const tr=recs.filter(r=>r.teacherId===t.id);const cr=tr.find(r=>r.cycle===cycle);let st='absent',sc='status-red',sl='Absent';if(cr){if(cr.isInsideGeofence){st='inside';sc='status-green';sl='Inside';insC++}else{st='outside';sc='status-yellow';sl='Outside';outC++}}else absC++;return{...t,st,sc,sl,cr,rate:tr.filter(r=>r.status==='present').length+'/'+Math.max(cycle,1),tr}});
const tabs=['live','schools','teachers','reports'];
const tabLabels={'live':'Live Monitor','schools':'School Management','teachers':'Teachers & Photos','reports':'Analytics & Reports'};
return`<div class="min-h-screen bg-slate-50">
<header class="bg-white shadow-sm border-b"><div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between"><div class="flex items-center gap-3"><div class="w-3 h-3 bg-red-500 rounded-full pulse-dot"></div><h1 class="text-lg font-bold text-slate-900">Admin Panel</h1><span class="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">LIVE</span></div><div class="flex items-center gap-3"><span class="text-sm text-slate-600">${this.state.currentUser.name}</span><button id="btnLogout" class="p-2 text-slate-400 hover:text-red-500 rounded-lg"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg></button></div></div></header>
<!-- Tabs -->
<div class="max-w-7xl mx-auto px-4"><div class="flex border-b bg-white mt-0 overflow-x-auto">${tabs.map(t=>`<button class="tab-btn ${this.state.adminTab===t?'tab-active':'tab-inactive'}" data-tab="${t}">${tabLabels[t]}</button>`).join('')}</div></div>
<main class="max-w-7xl mx-auto px-4 py-6">
${this.state.adminTab==='live'?this.renderLiveTab(school,teachers,rows,insC,outC,absC,cycle,today):''}
${this.state.adminTab==='schools'?this.renderSchoolsTab():''}
${this.state.adminTab==='teachers'?this.renderTeachersTab():''}
${this.state.adminTab==='reports'?this.renderReportsTab():''}
</main></div>`},

// ===== LIVE TAB =====
renderLiveTab(school,teachers,rows,insC,outC,absC,cycle,today){
return`<div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
<div class="bg-white rounded-xl shadow-sm border p-4"><p class="text-2xl font-bold text-indigo-600">${teachers.length}</p><p class="text-xs text-slate-500">Total</p></div>
<div class="bg-white rounded-xl shadow-sm border p-4"><p class="text-2xl font-bold text-green-600">${insC}</p><p class="text-xs text-slate-500">Inside</p></div>
<div class="bg-white rounded-xl shadow-sm border p-4"><p class="text-2xl font-bold text-yellow-600">${outC}</p><p class="text-xs text-slate-500">Outside</p></div>
<div class="bg-white rounded-xl shadow-sm border p-4"><p class="text-2xl font-bold text-red-600">${absC}</p><p class="text-xs text-slate-500">Absent</p></div>
<div class="bg-white rounded-xl shadow-sm border p-4"><p class="text-2xl font-bold text-purple-600">C${cycle}</p><p class="text-xs text-slate-500">${Utils.getCycleLabel(cycle)}</p></div></div>
<div class="flex justify-between items-center mb-4"><h2 class="text-lg font-semibold">Teacher Status</h2><button id="btnTriggerNotif" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700">Send 2-Hr Reminder</button></div>
<div class="bg-white rounded-xl shadow-sm border overflow-hidden"><table class="w-full"><thead class="bg-slate-50 border-b"><tr><th class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase">Teacher</th><th class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase">Status</th><th class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase">Location</th><th class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase">Face</th><th class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase">Rate</th><th class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase">Check-in</th></tr></thead><tbody class="divide-y">
${rows.map(t=>`<tr class="hover:bg-slate-50"><td class="px-4 py-3"><div class="flex items-center gap-2"><div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-medium text-sm">${t.name[0]}</div><div><p class="text-sm font-medium">${t.name}</p><p class="text-xs text-slate-400">${t.email}</p></div></div></td><td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs font-medium ${t.sc}">${t.sl}</span></td><td class="px-4 py-3 text-xs">${t.cr?t.cr.isInsideGeofence?'<span class="text-green-600">In campus</span>':`<span class="text-red-600">Off (${t.cr.distance}m)</span>`:'<span class="text-slate-400">-</span>'}</td><td class="px-4 py-3 text-xs">${t.cr?.faceVerified?'<span class="text-green-600">Verified</span>':'<span class="text-slate-400">-</span>'}</td><td class="px-4 py-3 text-sm font-medium">${t.rate}</td><td class="px-4 py-3 text-xs">${t.cr?Utils.formatTime(t.cr.checkInTime):'--'}</td></tr>`).join('')}
</tbody></table></div>
<div class="mt-6 bg-white rounded-xl shadow-sm border p-6"><h3 class="font-semibold mb-3">School: ${school.name}</h3><div class="grid grid-cols-3 gap-4 mb-3"><div class="p-3 bg-slate-50 rounded-lg"><p class="text-xs text-slate-500">Location</p><p class="text-sm font-semibold">${school.latitude.toFixed(4)}, ${school.longitude.toFixed(4)}</p></div><div class="p-3 bg-slate-50 rounded-lg"><p class="text-xs text-slate-500">Radius</p><p class="text-sm font-semibold">${school.radiusMeters}m</p></div><div class="p-3 bg-slate-50 rounded-lg"><p class="text-xs text-slate-500">Cycles</p><p class="text-sm font-semibold">5/day (8AM-6PM)</p></div></div><div id="adminMap"></div></div>`},

// ===== SCHOOLS TAB =====
renderSchoolsTab(){
const schools=DB.getSchools();
return`<div class="space-y-6 fade-in">
<div class="flex justify-between items-center"><h2 class="text-lg font-semibold">School Management</h2></div>
<!-- Existing Schools -->
<div class="bg-white rounded-xl shadow-sm border p-6"><h3 class="font-semibold mb-4">Registered Schools</h3>
${schools.map(s=>`<div class="flex items-center justify-between p-4 bg-slate-50 rounded-lg mb-3"><div class="flex items-center gap-4"><div class="w-10 h-10 bg-indigo-100 rounded-lg flex items-center justify-center text-indigo-600 text-lg">🏫</div><div><p class="font-medium text-sm">${s.name}</p><p class="text-xs text-slate-500">${s.address}</p><p class="text-xs text-slate-400">Lat: ${s.latitude.toFixed(6)}, Lng: ${s.longitude.toFixed(6)} | Radius: ${s.radiusMeters}m</p></div></div><button class="text-xs text-indigo-600 hover:text-indigo-800" onclick="App.editSchoolRadius('${s.id}')">Edit Radius</button></div>`).join('')}
</div>
<!-- Add New School -->
<div class="bg-white rounded-xl shadow-sm border p-6"><h3 class="font-semibold mb-4">Add / Update School Location</h3>
<p class="text-sm text-slate-500 mb-4">Click on the map to select school location OR enter coordinates manually below.</p>
<div id="schoolMap" class="mb-4"></div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">

// ===== REPORTS TAB =====
renderReportsTab(){
const teachers=DB.getTeachers().filter(t=>t.role==='teacher');
const today=Utils.getTodayDate();
const last30=Utils.getLastNDays(30);
const startDate=this.state.reportStart||last30[0];
const endDate=this.state.reportEnd||today;
const selTeacher=this.state.reportTeacher||'all';

// Calculate report data
let reportData=[];
if(selTeacher==='all'){
reportData=teachers.map(t=>{const recs=DB.getAttendanceRange(t.id,startDate,endDate);const days=new Set(recs.map(r=>r.date));const totalCycles=recs.length;const insideCount=recs.filter(r=>r.isInsideGeofence).length;return{name:t.name,email:t.email,daysPresent:days.size,totalCycles,insideCount,outsideCount:totalCycles-insideCount,rate:totalCycles>0?Math.round((insideCount/totalCycles)*100):0}})
}else{
const t=DB.getTeacher(selTeacher);const recs=DB.getAttendanceRange(selTeacher,startDate,endDate);
// Group by date
const byDate={};recs.forEach(r=>{if(!byDate[r.date])byDate[r.date]={date:r.date,cycles:0,inside:0,outside:0};byDate[r.date].cycles++;if(r.isInsideGeofence)byDate[r.date].inside++;else byDate[r.date].outside++});
reportData=Object.values(byDate).sort((a,b)=>a.date.localeCompare(b.date));
}

// Chart data - last 7 days attendance count
const last7=Utils.getLastNDays(7);
const chartData=last7.map(d=>{const dayRecs=DB.getAllAttendanceToday(d);const unique=new Set(dayRecs.map(r=>r.teacherId));return{date:d,count:unique.size}});
const maxCount=Math.max(...chartData.map(d=>d.count),1);

return`<div class="space-y-6 fade-in">

<!-- Filters -->
<div class="bg-white rounded-xl shadow-sm border p-4">
<div class="grid grid-cols-1 md:grid-cols-4 gap-4">
<div><label class="block text-xs font-medium text-slate-600 mb-1">Teacher</label><select id="reportTeacher" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none"><option value="all" ${selTeacher==='all'?'selected':''}>All Teachers</option>${teachers.map(t=>`<option value="${t.id}" ${selTeacher===t.id?'selected':''}>${t.name}</option>`).join('')}</select></div>
<div><label class="block text-xs font-medium text-slate-600 mb-1">Start Date</label><input id="reportStart" type="date" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" value="${startDate}"></div>
<div><label class="block text-xs font-medium text-slate-600 mb-1">End Date</label><input id="reportEnd" type="date" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" value="${endDate}"></div>
<div class="flex items-end gap-2"><button id="btnApplyReport" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700 flex-1">Apply</button><button id="btnReportMonth" class="px-3 py-2 bg-slate-100 text-slate-700 rounded-lg text-sm hover:bg-slate-200">30D</button><button id="btnReportWeek" class="px-3 py-2 bg-slate-100 text-slate-700 rounded-lg text-sm hover:bg-slate-200">7D</button></div>
</div></div>
<!-- 7-Day Chart -->
<div class="bg-white rounded-xl shadow-sm border p-6">
<h3 class="font-semibold text-sm mb-4">Last 7 Days Attendance (Unique Teachers Present)</h3>
<div class="flex items-end justify-between gap-2" style="height:180px">
${chartData.map(d=>`<div class="flex-1 flex flex-col items-center justify-end h-full"><div class="chart-bar bg-indigo-500 w-full" style="height:${(d.count/maxCount)*140}px" title="${d.count} teachers"></div><p class="text-xs text-slate-500 mt-2">${Utils.formatDate(d.date)}</p><p class="text-xs font-medium text-indigo-600">${d.count}</p></div>`).join('')}
</div></div>
<!-- Report Table -->
<div class="bg-white rounded-xl shadow-sm border overflow-hidden">

${selTeacher==='all'?`<table class="w-full"><thead class="bg-slate-50"><tr><th class="px-4 py-3 text-left text-xs font-medium text-slate-500">Teacher</th><th class="px-4 py-3 text-left text-xs font-medium text-slate-500">Days Present</th><th class="px-4 py-3 text-left text-xs font-medium text-slate-500">Total Check-ins</th><th class="px-4 py-3 text-left text-xs font-medium text-slate-500">Inside</th><th class="px-4 py-3 text-left text-xs font-medium text-slate-500">Outside</th><th class="px-4 py-3 text-left text-xs font-medium text-slate-500">Inside Rate</th></tr></thead><tbody class="divide-y">${reportData.map(r=>`<tr class="hover:bg-slate-50"><td class="px-4 py-3 text-sm font-medium">${r.name}</td><td class="px-4 py-3 text-sm">${r.daysPresent}</td><td class="px-4 py-3 text-sm">${r.totalCycles}</td><td class="px-4 py-3 text-sm text-green-600">${r.insideCount}</td><td class="px-4 py-3 text-sm text-red-600">${r.outsideCount}</td><td class="px-4 py-3"><div class="flex items-center gap-2"><div class="w-16 h-2 bg-slate-200 rounded-full overflow-hidden"><div class="h-full bg-green-500 rounded-full" style="width:${r.rate}%"></div></div><span class="text-xs font-medium">${r.rate}%</span></div></td></tr>`).join('')}</tbody></table>`
:`<table class="w-full"><thead class="bg-slate-50"><tr><th class="px-4 py-3 text-left text-xs font-medium text-slate-500">Date</th><th class="px-4 py-3 text-left text-xs font-medium text-slate-500">Cycles Marked</th><th class="px-4 py-3 text-left text-xs font-medium text-slate-500">Inside</th><th class="px-4 py-3 text-left text-xs font-medium text-slate-500">Outside</th></tr></thead><tbody class="divide-y">${reportData.map(r=>`<tr class="hover:bg-slate-50"><td class="px-4 py-3 text-sm">${Utils.formatDate(r.date)}</td><td class="px-4 py-3 text-sm font-medium">${r.cycles}/5</td><td class="px-4 py-3 text-sm text-green-600">${r.inside}</td><td class="px-4 py-3 text-sm text-red-600">${r.outside}</td></tr>`).join('')}</tbody></table>`}
</div>
<!-- Summary Stats -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4">
${selTeacher==='all'?`
<div class="bg-white rounded-xl shadow-sm border p-4 text-center"><p class="text-2xl font-bold text-indigo-600">${reportData.reduce((a,r)=>a+r.daysPresent,0)}</p><p class="text-xs text-slate-500">Total Days Present</p></div>
<div class="bg-white rounded-xl shadow-sm border p-4 text-center"><p class="text-2xl font-bold text-green-600">${reportData.reduce((a,r)=>a+r.insideCount,0)}</p><p class="text-xs text-slate-500">Total Inside Check-ins</p></div>
<div class="bg-white rounded-xl shadow-sm border p-4 text-center"><p class="text-2xl font-bold text-red-600">${reportData.reduce((a,r)=>a+r.outsideCount,0)}</p><p class="text-xs text-slate-500">Total Outside Check-ins</p></div>
<div class="bg-white rounded-xl shadow-sm border p-4 text-center"><p class="text-2xl font-bold text-purple-600">${reportData.length>0?Math.round(reportData.reduce((a,r)=>a+r.rate,0)/reportData.length):0}%</p><p class="text-xs text-slate-500">Avg Inside Rate</p></div>`
:`<div class="bg-white rounded-xl shadow-sm border p-4 text-center"><p class="text-2xl font-bold text-indigo-600">${reportData.length}</p><p class="text-xs text-slate-500">Days Present</p></div>
<div class="bg-white rounded-xl shadow-sm border p-4 text-center"><p class="text-2xl font-bold text-green-600">${reportData.reduce((a,r)=>a+r.inside,0)}</p><p class="text-xs text-slate-500">Inside Check-ins</p></div>
<div class="bg-white rounded-xl shadow-sm border p-4 text-center"><p class="text-2xl font-bold text-red-600">${reportData.reduce((a,r)=>a+r.outside,0)}</p><p class="text-xs text-slate-500">Outside Check-ins</p></div>
<div class="bg-white rounded-xl shadow-sm border p-4 text-center"><p class="text-2xl font-bold text-purple-600">${reportData.reduce((a,r)=>a+r.cycles,0)}</p><p class="text-xs text-slate-500">Total Cycles</p></div>`}
</div></div>`},

// ===== EVENT BINDING =====
bindEvents(){
const $=id=>document.getElementById(id);
// Login form
const lf=$('loginForm');
if(lf)lf.onsubmit=e=>{e.preventDefault();this.login($('loginEmail').value,$('loginPassword').value)};
// Logout
const lo=$('btnLogout');if(lo)lo.onclick=()=>this.logout();
// Admin tabs
document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>this.switchTab(b.dataset.tab));
// Live tab - trigger notif
const tn=$('btnTriggerNotif');if(tn)tn.onclick=()=>{const count=Scheduler.triggerManual();this.state.success=`Notifications sent to ${count} teachers!`;this.render()};
// Schools tab
const sm=$('btnSaveSchool');if(sm)sm.onclick=()=>this.saveSchool();
const ns=$('btnAddNewSchool');if(ns)ns.onclick=()=>this.addNewSchool();
const ml=$('btnUseMyLocation');if(ml)ml.onclick=()=>this.useMyLocation();
// Teachers tab
document.querySelectorAll('.btn-upload-photo').forEach(b=>b.onclick=()=>this.uploadPhoto(b.dataset.id));
document.querySelectorAll('.btn-view-teacher').forEach(b=>b.onclick=()=>this.viewTeacherDetail(b.dataset.id));
document.querySelectorAll('.btn-edit-radius').forEach(b=>b.onclick=()=>this.editSchoolRadius());
// Reports tab
const ar=$('btnApplyReport');if(ar)ar.onclick=()=>{this.state.reportStart=$('reportStart').value;this.state.reportEnd=$('reportEnd').value;const sel=$('reportTeacher');if(sel)this.state.reportTeacher=sel.value;this.render()};
const rm=$('btnReportMonth');if(rm)rm.onclick=()=>{const d=new Date();this.state.reportEnd=Utils.getTodayDate();d.setDate(d.getDate()-30);this.state.reportStart=d.toISOString().split('T')[0];this.render()};
const rw=$('btnReportWeek');if(rw)rw.onclick=()=>{const d=new Date();this.state.reportEnd=Utils.getTodayDate();d.setDate(d.getDate()-7);this.state.reportStart=d.toISOString().split('T')[0];this.render()};
const ec=$('btnExportCSV');if(ec)ec.onclick=()=>this.exportCSV();
const rt=$('reportTeacher');if(rt)rt.onchange=()=>{this.state.reportTeacher=rt.value;this.render()};
// Teacher panel
const ci=$('btnCheckIn');if(ci)ci.onclick=()=>this.handleCheckIn();
const co=$('btnCheckOut');if(co)co.onclick=()=>this.handleCheckOut();
const rg=$('btnRefreshGeo');if(rg)rg.onclick=()=>this.refreshGeofence();
// Face modal
const cf=$('btnCloseFace');if(cf)cf.onclick=()=>this.closeFaceModal();
const cp=$('btnCaptureFace');if(cp)cp.onclick=()=>this.captureFace();
// Dismiss notifications
document.querySelectorAll('.dismiss-notif').forEach(b=>b.onclick=()=>this.dismissNotif(b.dataset.id));
// Init maps
if(this.state.currentPage==='teacher')setTimeout(()=>this.initSchoolMap(),200);
if(this.state.adminTab==='schools'||this.state.adminTab==='live')setTimeout(()=>this.initAdminMap(),200);
},

// ===== HELPER METHODS =====
initSchoolMap(){
const s=DB.getSchool();
const el=document.getElementById('map');
if(!el||!el.offsetParent)return;
if(this._teacherMap){this._teacherMap.remove();this._teacherMap=null}
this._teacherMap=L.map('map').setView([s.latitude,s.longitude],16);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'OSM'}).addTo(this._teacherMap);
L.circle([s.latitude,s.longitude],{radius:s.radiusMeters,color:'#4f46e5',fillOpacity:.1}).addTo(this._teacherMap);
L.marker([s.latitude,s.longitude]).addTo(this._teacherMap).bindPopup(s.name);
if(this.state.geofenceStatus&&GeoEngine.currentPosition){const p=GeoEngine.currentPosition;L.marker([p.latitude,p.longitude],{icon:L.divIcon({className:'',html:'<div style="width:12px;height:12px;background:#ef4444;border:2px solid #fff;border-radius:50%;box-shadow:0 2px 4px rgba(0,0,0,.3)"></div>'})}).addTo(this._teacherMap).bindPopup('You are here')}
},
initAdminMap(){
const s=DB.getSchool();
let el=document.getElementById('schoolMap')||document.getElementById('adminMap');
if(!el)return;
const mapId=el.id;
if(this.state.schoolMapInstance){try{this.state.schoolMapInstance.remove()}catch(e){};this.state.schoolMapInstance=null}
this.state.schoolMapInstance=L.map(mapId).setView([s.latitude,s.longitude],15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'OSM'}).addTo(this.state.schoolMapInstance);
L.circle([s.latitude,s.longitude],{radius:s.radiusMeters,color:'#4f46e5',fillOpacity:.1,weight:2,dashArray:'5,5'}).addTo(this.state.schoolMapInstance);
this.state.schoolMarker=L.marker([s.latitude,s.longitude],{draggable:mapId==='schoolMap'}).addTo(this.state.schoolMapInstance).bindPopup(s.name+' ('+s.radiusMeters+'m radius)');
if(mapId==='schoolMap'){
this.state.schoolMarker.on('dragend',e=>{const p=e.target.getLatLng();this.state.newSchoolLat=p.lat;this.state.newSchoolLng=p.lng;const li=document.getElementById('schoolLat');const ln=document.getElementById('schoolLng');if(li)li.value=p.lat.toFixed(6);if(ln)ln.value=p.lng.toFixed(6)});
this.state.schoolMapInstance.on('click',e=>{this.state.newSchoolLat=e.latlng.lat;this.state.newSchoolLng=e.latlng.lng;this.state.schoolMarker.setLatLng(e.latlng);const li=document.getElementById('schoolLat');const ln=document.getElementById('schoolLng');if(li)li.value=e.latlng.lat.toFixed(6);if(ln)ln.value=e.latlng.lng.toFixed(6)})
}
},
uploadPhoto(teacherId,event){
if(event&&event.target&&event.target.files&&event.target.files[0]){
const file=event.target.files[0];const reader=new FileReader();
reader.onload=e=>{DB.updateTeacher(teacherId,{photo:e.target.result});this.render()};
reader.readAsDataURL(file);
}
},
viewTeacherDetail(teacherId){
const t=DB.getTeacher(teacherId);if(!t)return;
const today=Utils.getTodayDate();const recs=DB.getAttendance(t.id,today);
alert(`Teacher: ${t.name}\nEmail: ${t.email}\nToday's records: ${recs.length}\nHas face data: ${t.faceDescriptor?'Yes':'No'}`)
},
editSchoolRadius(id){
const s=DB.getSchools().find(x=>x.id===id)||DB.getSchool();
const r=prompt('Enter new geofence radius in meters:',s.radiusMeters);
if(r&&!isNaN(r)&&Number(r)>0){DB.updateSchool(s.id,{radiusMeters:Number(r)});this.render()}
},
saveSchool(){
const name=document.getElementById('schoolName')?.value;
const lat=document.getElementById('schoolLat')?.value;
const lng=document.getElementById('schoolLng')?.value;
const rad=document.getElementById('schoolRadius')?.value;
if(!name||!lat||!lng||!rad){this.state.error='All fields required';this.render();return}
DB.updateSchool(DB.getSchool().id,{name,latitude:parseFloat(lat),longitude:parseFloat(lng),radiusMeters:parseInt(rad)});
this.state.success='School updated!';this.state.error='';this.render()
},
addNewSchool(){
const name=document.getElementById('schoolName')?.value||'New School';
const addr=document.getElementById('schoolAddress')?.value||'';
const lat=parseFloat(document.getElementById('schoolLat')?.value)||28.6139;
const lng=parseFloat(document.getElementById('schoolLng')?.value)||77.209;
const rad=parseInt(document.getElementById('schoolRadius')?.value)||200;
DB.addSchool({id:DB.uuid(),name,address:addr,latitude:lat,longitude:lng,radiusMeters:rad,createdAt:new Date().toISOString()});
this.state.success='New school added!';this.render()
},
useMyLocation(){
GeoEngine.getCurrentPosition().then(p=>{
this.state.newSchoolLat=p.latitude;this.state.newSchoolLng=p.longitude;
const li=document.getElementById('schoolLat');const ln=document.getElementById('schoolLng');
if(li)li.value=p.latitude.toFixed(6);if(ln)ln.value=p.longitude.toFixed(6);
if(this.state.schoolMarker)this.state.schoolMarker.setLatLng([p.latitude,p.longitude]);
if(this.state.schoolMapInstance)this.state.schoolMapInstance.setView([p.latitude,p.longitude],16);
}).catch(()=>{this.state.error='Could not get location';this.render()})
},
exportCSV(){
const selTeacher=this.state.reportTeacher||'all';
const teachers=DB.getTeachers().filter(t=>t.status==='active'&&t.role!=='admin');
let csv='';
if(selTeacher==='all'){
csv='Teacher,Days Present,Total Check-ins,Inside,Outside,Inside Rate\n';
teachers.forEach(t=>{const recs=DB.getAttendanceRange(t.id,this.state.reportStart,this.state.reportEnd);const ins=recs.filter(r=>r.isInsideGeofence).length;const outs=recs.length-ins;const days=[...new Set(recs.map(r=>r.date))].length;csv+=`"${t.name}",${days},${recs.length},${ins},${outs},${recs.length>0?Math.round(ins/recs.length*100):0}%\n`});
}else{
csv='Date,Cycles,Inside,Outside\n';
const recs=DB.getAttendanceRange(selTeacher,this.state.reportStart,this.state.reportEnd);
const byDate={};recs.forEach(r=>{if(!byDate[r.date])byDate[r.date]={cycles:0,inside:0,outside:0};byDate[r.date].cycles++;if(r.isInsideGeofence)byDate[r.date].inside++;else byDate[r.date].outside++});
Object.entries(byDate).forEach(([d,v])=>{csv+=`${d},${v.cycles},${v.inside},${v.outside}\n`});
}
const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);
const a=document.createElement('a');a.href=url;a.download=`attendance_report_${Utils.getTodayDate()}.csv`;a.click();URL.revokeObjectURL(url)
},

// ===== CAMERA METHODS =====
async startCamera(){
try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:640,height:480}});const v=document.getElementById('cameraFeed');if(v){v.srcObject=s;this._stream=s}}catch(e){this.state.error='Camera access denied';this.render()}
},
stopCamera(){
if(this._stream){this._stream.getTracks().forEach(t=>t.stop());this._stream=null}
},
closeFaceModal(){
this.stopCamera();this.state.showFaceModal=false;this.state.error='';this.render()
},
async captureFace(){
const v=document.getElementById('cameraFeed');if(!v)return;
const loaded=await FaceEngine.loadModels();
if(!loaded){this.state.error='Face models not loaded. Please wait and try again.';this.render();return}
const desc=await FaceEngine.detectFace(v);
if(!desc){this.state.error='No face detected. Please position your face clearly.';this.render();return}
if(this.state.faceMode==='register'){
const tid=this.state._uploadTarget||this.state.currentUser.id;
DB.updateTeacher(tid,{faceDescriptor:desc});
this.state.success='Face registered successfully!';this.state.error='';this.closeFaceModal()
}else{
const t=this.state.currentUser;
if(!t.faceDescriptor){this.state.error='No face registered. Please register first.';this.render();return}
const match=FaceEngine.verifyFace(t.faceDescriptor,desc);
if(match){this.state._faceVerified=true;this.state.success='Face verified!';this.closeFaceModal();this.completeCheckIn()}
else{this.state.error='Face does not match. Try again.';this.render()}
}
},

// ===== CHECK-IN/OUT =====
async handleCheckIn(){
this.state.error='';this.state.success='';
const t=this.state.currentUser;
if(t.faceDescriptor){this.state.faceMode='verify';this.state.showFaceModal=true;this.state._faceVerified=false;this.render();setTimeout(()=>this.startCamera(),300);return}
this.state._faceVerified=false;this.completeCheckIn()
},
async completeCheckIn(){
try{
const pos=await GeoEngine.getCurrentPosition();
const geo=GeoEngine.verifyGeofence(pos.latitude,pos.longitude);
const t=this.state.currentUser;
const cycle=Utils.getCurrentCycle();
const today=Utils.getTodayDate();
const existing=DB.getAttendance(t.id,today);
if(existing.find(r=>r.cycle===cycle)){this.state.error='Already checked in for this cycle';this.render();return}
const rec={id:DB.uuid(),teacherId:t.id,date:today,cycle:cycle,checkInTime:new Date().toISOString(),isInsideGeofence:geo.isInside,distance:geo.distance,faceVerified:!!this.state._faceVerified,status:'present',latitude:pos.latitude,longitude:pos.longitude};
DB.addAttendance(rec);
this.state.geofenceStatus=geo;
this.state.success=`Checked in! ${geo.isInside?'Inside':'Outside'} geofence (${geo.distance}m)`;
this.state.error='';this.render()
}catch(e){this.state.error='Location error: '+e;this.render()}
},
async handleCheckOut(){
this.state.error='';this.state.success='';
try{
const pos=await GeoEngine.getCurrentPosition();
const geo=GeoEngine.verifyGeofence(pos.latitude,pos.longitude);
const t=this.state.currentUser;
const cycle=Utils.getCurrentCycle();
const today=Utils.getTodayDate();
const existing=DB.getAttendance(t.id,today);
if(existing.find(r=>r.cycle===cycle)){this.state.error='Already marked for this cycle. Cannot check out separately.';this.render();return}
const rec={id:DB.uuid(),teacherId:t.id,date:today,cycle:cycle,checkInTime:new Date().toISOString(),checkOutTime:new Date().toISOString(),isInsideGeofence:geo.isInside,distance:geo.distance,faceVerified:false,status:'checked_out',latitude:pos.latitude,longitude:pos.longitude};
DB.addAttendance(rec);
this.state.geofenceStatus=geo;
this.state.success='Checked out successfully!';this.state.error='';this.render()
}catch(e){this.state.error='Location error: '+e;this.render()}
},
async refreshGeofence(){
try{const pos=await GeoEngine.getCurrentPosition();const geo=GeoEngine.verifyGeofence(pos.latitude,pos.longitude);this.state.geofenceStatus=geo;this.render();setTimeout(()=>this.initSchoolMap(),200)}catch(e){this.state.error='Could not get location: '+e;this.render()}
},
dismissNotif(id){
DB.markNotifRead(id);this.state.notifications=this.state.notifications.map(n=>n.id===id?{...n,read:true}:n);this.render()
}
};

// ===== INIT =====
document.addEventListener('DOMContentLoaded',()=>App.init());
</script>
